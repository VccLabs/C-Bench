<!--
  C-Bench / VccLabs — TR660 screen mockup
  Artboard: 480 x 480 (square). Tell Claude your real panel res to rescale.
  Maps to Giraffe primitives: labels (readout), image-buttons (rows), buttons (Scan/Activate).
  PDO data seeded from the real 140W charger dump.
-->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>C-Bench — TR660 UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ---- design tokens ---- */
  :root{
    --ink:        #0C0F14;   /* deepest instrument body */
    --surface:    #151A22;   /* panel surface */
    --surface-2:  #1C232D;   /* raised row */
    --hairline:   #2A323D;   /* dividers */
    --glow:       #FFB23E;   /* primary readout — sodium/VFD amber */
    --data:       #9FB2C4;   /* secondary numerics */
    --muted:      #5C6B7A;   /* labels / captions */
    --accent:     #2FE0C2;   /* interactive: select + armed (USB-C teal) */
    --accent-dim: #15534b;
    --fault:      #FF5C5C;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    background:
      radial-gradient(circle at 50% 30%, #1a2129 0%, #0a0d11 60%, #07090c 100%);
    min-height:100vh;
    display:flex; flex-direction:column; gap:18px;
    align-items:center; justify-content:center;
    font-family:'IBM Plex Mono', monospace;
    padding:40px 16px;
  }

  .caption{ color:#46535f; font-size:12px; letter-spacing:.12em; text-transform:uppercase; }

  /* ---- device bezel ---- */
  .device{
    width:480px; height:480px;
    background:linear-gradient(160deg,#20262e,#0d1014);
    border-radius:26px;
    padding:14px;
    box-shadow:0 30px 70px -20px #000, inset 0 1px 0 #3a434f;
  }

  .screen{
    width:100%; height:100%;
    background:var(--ink);
    border-radius:14px;
    overflow:hidden;
    display:flex; flex-direction:column;
    position:relative;
    border:1px solid #000;
  }

  /* ---- top status bar ---- */
  .bar{
    display:flex; align-items:center; justify-content:space-between;
    padding:13px 16px;
    border-bottom:1px solid var(--hairline);
    background:linear-gradient(180deg,#11161d,#0c0f14);
  }
  .brand{ font-family:'Saira Condensed',sans-serif; font-weight:700;
          letter-spacing:.14em; color:#E7EEF5; font-size:18px; }
  .brand b{ color:var(--accent); }
  .source{ color:var(--muted); font-size:11px; letter-spacing:.06em; margin-top:2px; }

  .pill{
    font-family:'Saira Condensed',sans-serif; font-weight:600;
    font-size:13px; letter-spacing:.16em;
    padding:5px 12px; border-radius:999px;
    border:1px solid var(--hairline); color:var(--muted);
    white-space:nowrap;
  }
  .pill.ready{ color:var(--data); border-color:#33414e; }
  .pill.armed{ color:#04110e; background:var(--accent); border-color:var(--accent);
               box-shadow:0 0 18px -4px var(--accent); }

  /* ---- hero readout ---- */
  .readout{
    padding:14px 18px 12px;
    border-bottom:1px solid var(--hairline);
  }
  .volts{
    font-family:'IBM Plex Mono',monospace; font-weight:600;
    font-size:62px; line-height:.92; letter-spacing:-.02em;
    color:#3a3326; transition:color .25s, text-shadow .25s;
  }
  .volts .u{ font-size:24px; color:#4a4332; margin-left:6px; letter-spacing:0; }
  .screen.live .volts{ color:var(--glow); text-shadow:0 0 22px -2px rgba(255,178,62,.55); }
  .screen.live .volts .u{ color:#b58536; }

  .sub{ display:flex; gap:26px; margin-top:8px; }
  .sub .k{ color:var(--muted); font-size:10px; letter-spacing:.14em; text-transform:uppercase; }
  .sub .v{ color:#404a54; font-size:20px; font-weight:500; }
  .screen.live .sub .v{ color:var(--data); }

  /* ---- profiles list ---- */
  .listhead{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px 8px;
  }
  .listhead span{ color:var(--muted); font-size:11px; letter-spacing:.16em; text-transform:uppercase; }

  .scan{
    font-family:'Saira Condensed',sans-serif; font-weight:600;
    font-size:13px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--accent); background:transparent;
    border:1px solid var(--accent-dim); border-radius:8px;
    padding:6px 14px; cursor:pointer; transition:.15s;
  }
  .scan:active{ background:var(--accent-dim); }

  .list{ flex:1; overflow-y:auto; padding:0 12px 10px; }
  .list::-webkit-scrollbar{ width:5px; }
  .list::-webkit-scrollbar-thumb{ background:#2a333d; border-radius:3px; }

  .empty{ color:#3c4651; font-size:13px; text-align:center; padding:34px 20px; line-height:1.6; }

  .row{
    display:flex; align-items:center; gap:12px;
    background:var(--surface); border:1px solid var(--hairline);
    border-left:3px solid transparent;
    border-radius:10px; padding:11px 13px; margin-top:8px;
    cursor:pointer; transition:.13s;
  }
  .row:active{ transform:scale(.992); }
  .row.sel{ background:var(--surface-2); border-color:var(--accent); border-left-color:var(--accent); }

  .badge{
    font-family:'Saira Condensed',sans-serif; font-weight:700;
    font-size:11px; letter-spacing:.08em;
    padding:3px 7px; border-radius:5px; min-width:42px; text-align:center;
  }
  .badge.fix{ color:#9fb2c4; background:#222b35; }
  .badge.pps{ color:#0a1a18; background:var(--accent); }
  .badge.avs{ color:#1c1206; background:var(--glow); }

  .rng{ flex:1; color:#D6E0E9; font-size:16px; font-weight:500; }
  .rng small{ color:var(--muted); font-size:11px; letter-spacing:.04em; }
  .amp{ color:var(--data); font-size:13px; }
  .row.sel .amp{ color:var(--accent); }

  /* ---- activate ---- */
  .foot{ padding:12px 14px 14px; border-top:1px solid var(--hairline); }
  .activate{
    width:100%; padding:15px;
    font-family:'Saira Condensed',sans-serif; font-weight:700;
    font-size:18px; letter-spacing:.18em; text-transform:uppercase;
    border:none; border-radius:12px; cursor:pointer;
    color:#2c333b; background:#1a2027; transition:.18s;
  }
  .activate.able{ color:#04110e; background:var(--accent); box-shadow:0 0 20px -6px var(--accent); }
  .activate.on{ color:#fff; background:var(--fault); box-shadow:0 0 22px -6px var(--fault); }

  .hint{ color:#3a444e; font-size:11px; text-align:center; margin-top:8px; letter-spacing:.04em; }
</style>

<div class="caption">TR660 · 480 × 480 artboard</div>

<div class="device">
  <div class="screen" id="screen">

    <div class="bar">
      <div>
        <div class="brand">C<b>·</b>BENCH</div>
        <div class="source" id="source">140 W USB-C · ready</div>
      </div>
      <div class="pill ready" id="state">READY</div>
    </div>

    <div class="readout">
      <div class="volts" id="vbig">––.––<span class="u">V</span></div>
      <div class="sub">
        <div><div class="k">Current</div><div class="v" id="cval">– A</div></div>
        <div><div class="k">Power</div><div class="v" id="pval">– W</div></div>
      </div>
    </div>

    <div class="listhead">
      <span>Source profiles</span>
      <button class="scan" id="scan">Scan</button>
    </div>

    <div class="list" id="list">
      <div class="empty">No profiles yet.<br>Plug in a source, then tap Scan.</div>
    </div>

    <div class="foot">
      <button class="activate" id="activate" disabled>Select a profile</button>
      <div class="hint" id="hint">Output is off until you activate.</div>
    </div>

  </div>
</div>

<div class="caption">tap Scan → pick a profile → Activate</div>

<script>
  // Real profiles from the 140W charger dump
  const PDOS = [
    {t:'fix', label:'5.00',  unit:'V', set:5.00,  a:'3.0 A'},
    {t:'fix', label:'9.00',  unit:'V', set:9.00,  a:'3.0 A'},
    {t:'fix', label:'12.00', unit:'V', set:12.00, a:'3.0 A'},
    {t:'fix', label:'15.00', unit:'V', set:15.00, a:'3.0 A'},
    {t:'fix', label:'20.00', unit:'V', set:20.00, a:'5.0 A'},
    {t:'pps', label:'3.3–11', unit:'V', set:9.00,  a:'5.0 A', range:true},
    {t:'pps', label:'3.3–21', unit:'V', set:12.00, a:'5.0 A', range:true},
    {t:'fix', label:'28.00', unit:'V', set:28.00, a:'5.0 A', epr:true},
    {t:'avs', label:'15–28',  unit:'V', set:24.00, a:'5.0 A', range:true, epr:true},
  ];

  const $ = id => document.getElementById(id);
  let sel = null, armed = false;

  $('scan').onclick = () => {
    armed = false; sel = null; setArmed(false);
    const list = $('list'); list.innerHTML = '';
    PDOS.forEach((p,i) => {
      const row = document.createElement('div');
      row.className = 'row';
      const tag = p.epr && p.t==='fix' ? 'EPR' : p.t.toUpperCase();
      row.innerHTML =
        `<span class="badge ${p.t}">${tag}</span>
         <span class="rng">${p.label} <small>${p.unit}${p.range?' · adjustable':''}</small></span>
         <span class="amp">${p.a}</span>`;
      row.onclick = () => pick(i, row);
      list.appendChild(row);
    });
    $('source').textContent = '140 W USB-C · 9 profiles';
  };

  function pick(i, row){
    document.querySelectorAll('.row').forEach(r=>r.classList.remove('sel'));
    row.classList.add('sel');
    sel = PDOS[i];
    $('vbig').innerHTML = `${sel.range?sel.label:sel.label}<span class="u">${sel.unit}</span>`;
    const act = $('activate');
    act.classList.add('able'); act.disabled = false;
    act.textContent = 'Activate output';
    $('hint').textContent = sel.range ? 'Adjustable rail — set fine value after arming.' : 'Output is off until you activate.';
    if(armed) setArmed(false);
  }

  $('activate').onclick = () => {
    if(!sel) return;
    armed = !armed; setArmed(armed);
  };

  function setArmed(on){
    armed = on;
    const screen=$('screen'), st=$('state'), act=$('activate');
    if(on){
      screen.classList.add('live');
      st.className='pill armed'; st.textContent='ARMED';
      act.className='activate on'; act.textContent='Stop output';
      $('vbig').innerHTML = `${sel.set.toFixed(2)}<span class="u">V</span>`;
      $('cval').textContent = '0.00 A';
      $('pval').textContent = '0.0 W';
      $('hint').textContent = 'Output live · monitoring bus.';
    } else {
      screen.classList.remove('live');
      st.className='pill ready'; st.textContent='READY';
      $('cval').textContent='– A'; $('pval').textContent='– W';
      if(sel){ act.className='activate able'; act.textContent='Activate output';
               $('hint').textContent='Output is off until you activate.'; }
    }
  }
</script>
